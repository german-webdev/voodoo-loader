name: Auto Tag On Master

on:
  push:
    branches:
      - master

permissions:
  contents: write
  actions: write

concurrency:
  group: auto-tag-master
  cancel-in-progress: false

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create next alpha tag
        id: tagger
        shell: bash
        run: |
          set -euo pipefail

          echo "new_tag=" >> "$GITHUB_OUTPUT"

          existing_tag="$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+-alpha$' | head -n1 || true)"
          if [[ -n "$existing_tag" ]]; then
            echo "Current commit already has version tag ${existing_tag}; reusing it."
            echo "new_tag=${existing_tag}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git log -1 --pretty=%B | grep -Eiq '\[skip-tag\]|\[no-tag\]'; then
            echo "Skip marker detected in commit message; skipping auto-tag."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --tags --force

          for attempt in 1 2 3 4 5; do
            latest_tag="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*-alpha' --sort=-v:refname | head -n1)"

            if [[ -z "$latest_tag" ]]; then
              major=0
              minor=1
              patch=0
            elif [[ "$latest_tag" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)-alpha$ ]]; then
              major="${BASH_REMATCH[1]}"
              minor="${BASH_REMATCH[2]}"
              patch="$((BASH_REMATCH[3] + 1))"
            else
              echo "Latest tag format is unsupported: $latest_tag"
              exit 1
            fi

            new_tag="v${major}.${minor}.${patch}-alpha"
            echo "Attempt ${attempt}: candidate tag ${new_tag}"

            if git rev-parse -q --verify "refs/tags/${new_tag}" >/dev/null; then
              echo "Tag ${new_tag} already exists locally, retrying..."
              git fetch --tags --force
              continue
            fi

            git tag -a "${new_tag}" -m "Voodoo Loader ${new_tag}"
            if git push origin "${new_tag}"; then
              echo "Created and pushed tag: ${new_tag}"
              echo "new_tag=${new_tag}" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "Push failed, retrying after tag refresh..."
            git tag -d "${new_tag}" || true
            git fetch --tags --force
          done

          echo "Failed to create/push auto tag after retries."
          exit 1

      - name: Trigger build-and-release workflow for tag
        if: ${{ steps.tagger.outputs.new_tag != '' }}
        uses: actions/github-script@v7
        env:
          NEW_TAG: ${{ steps.tagger.outputs.new_tag }}
        with:
          script: |
            const tag = process.env.NEW_TAG ?? "";
            core.info(`Dispatching Build Portable Matrix for ${tag}`);
            await github.request("POST /repos/{owner}/{repo}/actions/workflows/{workflow_id}/dispatches", {
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "build-portable-matrix.yml",
              ref: "master",
              inputs: {
                tag_name: tag
              }
            });
