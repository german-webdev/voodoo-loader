name: QA Gate

on:
  pull_request:
  push:
    branches:
      - master
      - "dev/**"

jobs:
  qa:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies for PySide6
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 \
            libpulse0 \
            libgl1 \
            libxkbcommon0 \
            libxkbcommon-x11-0 \
            libdbus-1-3
          sudo rm -rf /var/lib/apt/lists/*

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run QA gate
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          chmod +x scripts/qa_gate.sh
          ./scripts/qa_gate.sh --python python
