name: QA Gate

on:
  pull_request:
  push:
    branches:
      - master
      - "dev/**"

jobs:
  qa:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run QA gate
        run: |
          chmod +x scripts/qa_gate.sh
          ./scripts/qa_gate.sh --python python
