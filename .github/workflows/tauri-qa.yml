name: Tauri QA

on:
  pull_request:
    branches:
      - development
      - master
  push:
    branches:
      - development
      - master
      - "feature/**"

jobs:
  frontend-quality:
    name: Frontend Quality
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: VoodooLoader.Tauri

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: VoodooLoader.Tauri/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Storybook build
        run: STORYBOOK_DISABLE_TELEMETRY=1 npm run storybook:build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E smoke
        run: npm run e2e

  rust-quality:
    name: Rust Quality
    runs-on: windows-latest

    defaults:
      run:
        working-directory: VoodooLoader.Tauri/src-tauri

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo check
        run: cargo check --locked

      - name: Cargo tests
        run: cargo test --locked
