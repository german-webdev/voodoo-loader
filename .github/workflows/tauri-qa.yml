name: Tauri QA

on:
  pull_request:
    branches:
      - development
      - master
  push:
    branches:
      - development
      - master
      - "feature/**"

jobs:
  frontend-quality:
    name: Frontend Quality
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: VoodooLoader.Tauri

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: VoodooLoader.Tauri/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Storybook build
        run: STORYBOOK_DISABLE_TELEMETRY=1 npm run storybook:build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E smoke
        run: npm run e2e:smoke

  visual-regression:
    name: Visual Regression (${{ matrix.os_label }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            os_label: Windows
            snapshot_suffix: win32
          - os: ubuntu-latest
            os_label: Ubuntu
            snapshot_suffix: linux
          - os: macos-latest
            os_label: macOS
            snapshot_suffix: darwin

    defaults:
      run:
        working-directory: VoodooLoader.Tauri
    env:
      SNAPSHOT_SUFFIX: ${{ matrix.snapshot_suffix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect baseline for platform
        id: baseline
        shell: bash
        run: |
          set -e
          SNAPSHOT_DIR="tests/e2e/visual-regression.spec.ts-snapshots"
          if [ ! -d "$SNAPSHOT_DIR" ]; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ls "$SNAPSHOT_DIR"/*-chromium-"$SNAPSHOT_SUFFIX".png >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.baseline.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: VoodooLoader.Tauri/package-lock.json

      - name: Install dependencies
        if: steps.baseline.outputs.exists == 'true'
        run: npm ci

      - name: Install Playwright browser (Linux)
        if: steps.baseline.outputs.exists == 'true' && runner.os == 'Linux'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright browser (non-Linux)
        if: steps.baseline.outputs.exists == 'true' && runner.os != 'Linux'
        run: npx playwright install chromium

      - name: E2E visual regression
        if: steps.baseline.outputs.exists == 'true'
        run: npm run e2e:visual

      - name: No baseline for platform
        if: steps.baseline.outputs.exists != 'true'
        run: echo "No baseline snapshots for $SNAPSHOT_SUFFIX. Job skipped intentionally."

  rust-quality:
    name: Rust Quality
    runs-on: windows-latest

    defaults:
      run:
        working-directory: VoodooLoader.Tauri/src-tauri

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo check
        run: cargo check --locked

      - name: Cargo tests
        run: cargo test --locked
