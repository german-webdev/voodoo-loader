name: Tauri QA

on:
  pull_request:
    branches:
      - development
      - master
  push:
    branches:
      - development
      - master
      - "feature/**"

jobs:
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-22.04

    defaults:
      run:
        working-directory: VoodooLoader.Tauri

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: VoodooLoader.Tauri/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
